name: atalaia_social
description: Atalaia Social MVP
publish_to: "none"
version: 0.1.0+2

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_local_notifications: ^19.4.1
  intl: ^0.20.2
  timezone: ^0.10.0
  google_maps_flutter: ^2.15.0
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  file_picker: ^8.0.0
  image_picker: ^1.1.2
  image: ^4.2.0
  shared_preferences: ^2.2.3
  supabase_flutter: ^2.0.0
  url_launcher: ^6.2.6
  video_player: ^2.9.2
  web: ^1.1.1
  youtube_player_flutter: ^9.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/images/logo_icon.png"
  min_sdk_android: 21
  remove_alpha_ios: true

flutter_native_splash:
  color: "#FFFFFF"
  image: "assets/images/logo_splash.png"
  android: true
  ios: false

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/
