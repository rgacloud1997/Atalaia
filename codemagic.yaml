workflows:
  ios-build:
    name: Atalaia IOS

    environment:
      flutter: stable
      xcode: latest

      ios_signing:
        distribution_type: app_store
        bundle_identifier: br.com.sysrota.atalaia.app

    scripts:
      - name: Ensure iOS platform (FIX)
        script: |
          cd app
          flutter create --platforms=ios --org br.com.sysrota.atalaia .

      - name: Force Bundle Identifier (GARANTIA)
        script: |
          cd app/ios
          sed -i '' 's/com.example.runner/br.com.sysrota.atalaia.app/g' Runner.xcodeproj/project.pbxproj

      - name: Fix iOS deployment target
        script: |
          cd app/ios
          sed -i '' 's/platform :ios, .*/platform :ios, '\''14.0'\''/' Podfile

      - name: Clean project
        script: |
          cd app
          flutter clean

      - name: Install dependencies
        script: |
          cd app
          flutter pub get

      - name: Build IPA
        script: |
          cd app
          flutter build ipa --release

    artifacts:
      - app/build/ios/ipa/*.ipa