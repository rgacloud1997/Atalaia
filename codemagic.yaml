workflows:
  ios-build:
    name: Atalaia IOS

    environment:
      flutter: stable
      xcode: latest

      ios_signing:
        distribution_type: app_store
        bundle_identifier: br.com.sysrota.atalaia.app

    scripts:
      - name: Ensure iOS platform
        script: |
          cd app
          flutter create --platforms=ios --org br.com.sysrota.atalaia .

      - name: Fix Bundle Identifier
        script: |
          cd app/ios
          sed -i '' 's/com.example.runner/br.com.sysrota.atalaia.app/g' Runner.xcodeproj/project.pbxproj

      - name: Fix iOS deployment target (CRÍTICO)
        script: |
          cd app/ios

          # força iOS 14 no Podfile
          sed -i '' "s/platform :ios, .*/platform :ios, '14.0'/" Podfile

          # força iOS 14 no projeto
          sed -i '' "s/IPHONEOS_DEPLOYMENT_TARGET = .*/IPHONEOS_DEPLOYMENT_TARGET = 14.0;/g" Runner.xcodeproj/project.pbxproj

      - name: Clean project
        script: |
          cd app
          flutter clean

      - name: Install dependencies
        script: |
          cd app
          flutter pub get

      - name: Install Pods (FIX erro atual)
        script: |
          cd app/ios
          pod deintegrate
          pod install

      - name: Build IPA
        script: |
          cd app
          flutter build ipa --release

    artifacts:
      - app/build/ios/ipa/*.ipa