workflows:
  ios-build:
    name: Atalaia IOS

    environment:
      flutter: stable
      xcode: latest

    scripts:
      - name: Install dependencies
        script: |
          cd app
          flutter pub get

      - name: Build IPA
        script: |
          cd app
          flutter build ipa --release

    artifacts:
      - app/build/ios/iphoneos/*.app