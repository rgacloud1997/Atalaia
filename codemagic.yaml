workflows:
  ios-build:
    name: Atalaia IOS

    environment:
      flutter: stable
      xcode: latest

    scripts:
      - name: Install dependencies
        script: |
          cd app
          flutter pub get

      - name: Build iOS (sem assinatura)
        script: |
          cd app
          flutter build ios --release --no-codesign

    artifacts:
      - app/build/ios/iphoneos/*.app