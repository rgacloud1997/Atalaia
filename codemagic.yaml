workflows:
  ios-build:
    name: Atalaia IOS

    environment:
      flutter: stable
      xcode: latest

      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.example.app

    scripts:
      - name: Ensure iOS platform
        script: |
          cd app
          flutter create --platforms=ios .

      - name: Install dependencies
        script: |
          cd app
          flutter pub get

      - name: Build IPA
        script: |
          cd app
          flutter build ipa --release

    artifacts:
      - app/build/ios/ipa/*.ipa